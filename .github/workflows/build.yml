name: Build AIX Extension

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Your Code
      uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Clone MIT Extension Template
      run: |
        git clone --recurse-submodules https://github.com/mit-cml/extension-template.git template
        # 1. Bersihkan folder contoh dari template agar tidak bentrok
        rm -rf template/src/*
        # 2. Buat folder sesuai nama package: com.pkh.gpscamera
        mkdir -p template/src/com/pkh/gpscamera
        # 3. Copy file Java Anda ke sana
        cp src/com/pkh/gpscamera/GPSExtension.java template/src/com/pkh/gpscamera/

    - name: Install Ant
      run: sudo apt-get install ant -y

    - name: Build with Ant
      run: |
        cd template
        # Jalankan kompilasi
        ant extensions
        # Intip folder output untuk memastikan file tercipta
        echo "Daftar file di folder output:"
        ls -R out/extensions/ || echo "Folder out/extensions masih kosong!"

    - name: Upload AIX Result
      uses: actions/upload-artifact@v4
      with:
        name: Ekstensi-Kamera-PKH
        # Gunakan path yang lebih fleksibel agar terbaca
        path: template/out/extensions/*.aix
        if-no-files-found: error
