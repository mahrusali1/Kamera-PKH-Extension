name: Build AIX Extension

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Your Code
      uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Prepare MIT Template
      run: |
        # 1. Clone template resmi
        git clone --recurse-submodules https://github.com/mit-cml/extension-template.git /tmp/template
        
        # 2. Ambil folder 'lib' dan 'build.xml' saja
        cp -r /tmp/template/lib .
        cp /tmp/template/build.xml .

        # 3. BUAT SENDIRI file project.properties (Ini kuncinya!)
        echo "main.class=com.pkh.gpscamera.GPSExtension" > project.properties

    - name: Install Ant
      run: sudo apt-get install ant -y

    - name: Build with Ant
      run: |
        # Jalankan build
        ant extensions
        
        # Cek apakah file .aix sudah lahir
        echo "--- HASIL AKHIR ---"
        find . -name "*.aix"

    - name: Upload AIX Result
      uses: actions/upload-artifact@v4
      with:
        name: Ekstensi-Kamera-PKH
        path: "**/out/extensions/*.aix"
        if-no-files-found: error
