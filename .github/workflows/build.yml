name: Build AIX Extension

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Your Code
      uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Prepare MIT Template & Folders
      run: |
        # 1. Clone template resmi ke folder sementara
        git clone --recurse-submodules https://github.com/mit-cml/extension-template.git /tmp/template
        
        # 2. Ambil folder 'lib' dan 'build.xml' dari template ke root repo Anda
        cp -r /tmp/template/lib .
        cp /tmp/template/build.xml .

        # 3. Pastikan file project.properties ada di root
        echo "main.class=com.pkh.gpscamera.GPSExtension" > project.properties
        
        # 4. Pastikan folder 'out' bersih
        mkdir -p out/extensions

    - name: Install Ant
      run: sudo apt-get install ant -y

    - name: Build with Ant
      run: |
        # Jalankan build. 
        # PERHATIKAN: Ant akan mencari folder 'src' yang sudah Anda buat di repo GitHub Anda.
        ant extensions
        
        # CEK TOTAL: Apakah filenya lahir?
        echo "--- DAFTAR FILE DI FOLDER OUT ---"
        ls -R out/ || echo "Folder out kosong!"

    - name: Upload AIX Result
      uses: actions/upload-artifact@v4
      with:
        name: Ekstensi-Kamera-PKH
        # Gunakan path yang paling umum digunakan MIT
        path: "out/extensions/*.aix"
        if-no-files-found: error
