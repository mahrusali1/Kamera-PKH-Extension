name: Build AIX Extension

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Install Ant
      run: sudo apt-get install ant -y

    - name: Build with Ant
      run: ant extensions

    - name: Upload AIX Result
      uses: actions/upload-artifact@v4
      with:
        name: Ekstensi-Kamera-PKH
        path: out/extensions/*.aix
