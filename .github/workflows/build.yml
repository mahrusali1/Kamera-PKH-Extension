name: Build AIX Extension

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Your Code
      uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Prepare MIT Template
      run: |
        # 1. Clone template resmi ke folder sementara
        git clone --recurse-submodules https://github.com/mit-cml/extension-template.git /tmp/template
        
        # 2. Pindahkan isi folder 'lib' dan 'build.xml' dari template ke repo Anda
        cp -r /tmp/template/lib .
        cp /tmp/template/build.xml .
        cp /tmp/template/project.properties .

        # 3. Pastikan folder output tersedia
        mkdir -p out/extensions

    - name: Install Ant
      run: sudo apt-get install ant -y

    - name: Build with Ant
      run: |
        # Jalankan build langsung di root repo Anda
        ant extensions
        
        # CEK TOTAL: Cari di mana file .aix berada
        echo "--- HASIL PENCARIAN FILE AIX ---"
        find . -name "*.aix"

    - name: Upload AIX Result
      uses: actions/upload-artifact@v4
      with:
        name: Ekstensi-Kamera-PKH
        # Gunakan wildcard di seluruh folder agar pasti ketemu
        path: "**/*.aix"
        if-no-files-found: error
