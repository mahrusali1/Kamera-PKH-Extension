name: Build AIX Extension

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Your Code
      uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Clone MIT Extension Template
      run: |
        git clone --recurse-submodules https://github.com/mit-cml/extension-template.git template
        # 1. Bersihkan folder src dan sikat semua contoh bawaan
        rm -rf template/src/*
        # 2. Buat folder package yang benar
        mkdir -p template/src/com/pkh/gpscamera
        # 3. Copy file Java Anda ke folder template
        cp src/com/pkh/gpscamera/GPSExtension.java template/src/com/pkh/gpscamera/
        
        # 4. PAKSA file project.properties agar mengarah ke Class kita
        echo "main.class=com.pkh.gpscamera.GPSExtension" > template/project.properties
        echo "extension.main.class=com.pkh.gpscamera.GPSExtension" >> template/project.properties

    - name: Install Ant
      run: sudo apt-get install ant -y

    - name: Build with Ant
      run: |
        cd template
        # Jalankan build resmi MIT
        ant extensions
        # Cek isi folder out secara mendalam
        echo "--- CEK FOLDER OUTPUT ---"
        find out -name "*.aix" || echo "File AIX tidak ditemukan!"

    - name: Upload AIX Result
      uses: actions/upload-artifact@v4
      with:
        name: Ekstensi-Kamera-PKH
        path: template/out/extensions/*.aix
        if-no-files-found: error
